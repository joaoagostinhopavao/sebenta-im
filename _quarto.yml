project:
  type: book
  output-dir: docs

lang: pt-PT

bibliography: referencias.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

book:
  title: "Informática Médica"
  subtitle: "Sebenta da Unidade Curricular"
  author:
    - name: "João Pavão"
      affiliation: "Universidade de Trás-os-Montes e Alto Douro"
  date: last-modified

  chapters:
    - index.qmd
    - capitulos/cap01.qmd
    - capitulos/cap02.qmd
    - capitulos/cap03.qmd
    - capitulos/cap04.qmd
    - capitulos/cap05.qmd
    - capitulos/cap06.qmd
    - capitulos/cap07.qmd
    - capitulos/cap08.qmd
    - capitulos/cap09.qmd
    - capitulos/cap10.qmd
    - capitulos/cap11.qmd
    - referencias.qmd

  sidebar:
    search: true

  page-footer:
    left: "Informática Médica — Mestrado em Engenharia Biomédica · UTAD"
    right: "[🇬🇧 English](https://joaoagostinhopavao.github.io/sebenta-im/en/)"

format:
  html:
    theme:
      light: litera
      dark: darkly
    css: /assets/css/custom.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    number-sections: true
    number-depth: 3
    highlight-style: github
    code-fold: false
    code-tools: false
    fig-align: center

  pdf:
    documentclass: scrbook
    classoption: [oneside]
    papersize: a4
    fontsize: 11pt
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: "NavyBlue"
    urlcolor: "NavyBlue"
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=3cm
      - right=2.5cm
    include-in-header:
      text: |
        \AtBeginDocument{\input{assets/cover.tex}}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{multirow}
        \usepackage{amssymb}
        \usepackage{amsmath}
        \usepackage{caption}
        \captionsetup{font=small, labelfont=bf}
        \usepackage{xcolor}
        \usepackage{tikz}
        \definecolor{coverDark}{HTML}{050d28}
        \definecolor{coverAccent}{HTML}{1448c0}
        \definecolor{coverLight}{HTML}{3570e0}
        \definecolor{chapbg}{HTML}{dce8fa}
        \definecolor{chapnum}{HTML}{0a1845}
        \definecolor{chaptxt}{HTML}{08152e}
        \KOMAoption{chapterprefix}{false}
        \makeatletter
        \renewcommand{\chapterlinesformat}[3]{%
          {\setlength{\fboxsep}{12pt}%
          \noindent\colorbox{chapbg}{%
            \parbox[c][5cm]{\dimexpr\linewidth-2\fboxsep\relax}{%
              \def\@chnum{#2}%
              \ifx\@chnum\@empty%
                {\raggedright\hyphenpenalty=10000\exhyphenpenalty=10000\color{chaptxt}\huge\bfseries #3}%
              \else%
                \begin{minipage}[c]{3cm}%
                  \centering\color{chapnum}\fontsize{104}{104}\selectfont\bfseries #2%
                \end{minipage}%
                \hspace{10pt}%
                \begin{minipage}[c]{\dimexpr\linewidth-2\fboxsep-3cm-10pt\relax}%
                  \raggedright\hyphenpenalty=10000\exhyphenpenalty=10000\color{chaptxt}\fontsize{20}{24}\selectfont\bfseries #3%
                \end{minipage}%
              \fi%
            }%
          }}%
        }
        \makeatother
    pdf-engine: lualatex

execute:
  echo: true
  warning: false
  message: false

jupyter: /Users/jpavao/QProjects/venv/bin/python
