project:
  type: book
  output-dir: ../docs/en

lang: en-GB

bibliography: ../referencias.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

book:
  title: "Medical Informatics"
  subtitle: "Course Textbook"
  author:
    - name: "João Pavão"
      affiliation: "University of Trás-os-Montes e Alto Douro"
  date: last-modified

  chapters:
    - index.qmd
    - capitulos/cap01.qmd
    - capitulos/cap02.qmd
    - capitulos/cap03.qmd
    - capitulos/cap04.qmd
    - capitulos/cap05.qmd
    - capitulos/cap06.qmd
    - capitulos/cap07.qmd
    - capitulos/cap08.qmd
    - capitulos/cap09.qmd
    - capitulos/cap10.qmd
    - references.qmd

  sidebar:
    search: true

  page-footer:
    left: "Medical Informatics — Master's in Biomedical Engineering · UTAD"
    right: "[🇵🇹 Português](https://joaoagostinhopavao.github.io/sebenta-im/)"

format:
  html:
    theme:
      light: litera
      dark: darkly
    css: /assets/css/custom.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    number-sections: true
    number-depth: 3
    highlight-style: github
    code-fold: false
    code-tools: false
    fig-align: center

execute:
  echo: true
  warning: false
  message: false
